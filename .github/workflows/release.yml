name: release

# Build prebuilt binaries for every supported target and attach them to the
# GitHub Release when a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
# Asset names are `rust-my-claude-<target>` — exactly what `install.sh --bin`
# downloads from releases/latest/download/.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross_linker: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64 Linux)
        if: matrix.cross_linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage asset
        run: cp "target/${{ matrix.target }}/release/rust-my-claude" "rust-my-claude-${{ matrix.target }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: rust-my-claude-${{ matrix.target }}
          fail_on_unmatched_files: true
