# rust-my-claude — tokyonight theme
# Tokyo Night: deep blue/purple/cyan night palette with rounded caps.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"   # powerline | rounded | plain
default_fg          = 231
default_bg          = 234
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 234
bg    = 111

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 141

[git]
line  = 1
order = 2
icon  = ""
fg    = 234
# bg is dynamic: clean=71, staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 60

[vim]
line  = 1
order = 4
icon  = ""
fg    = 231
bg    = 117

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 234
bg    = 141

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 111
track  = 60
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 234
bg     = 179
format = "{cost:.4} · {duration}"
