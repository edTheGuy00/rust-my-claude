# rust-my-claude — tokyonight (one-line, compact)
# Auto-generated single-line variant of the 'tokyonight' theme.

[style]
separator = "rounded"
default_fg = 231
default_bg = 234
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""
cap_left = ""
cap_right = ""

[directory]
line = 1
order = 0
icon = ""
fg = 234
bg = 111

[model]
line = 1
order = 1
icon = "✳"
fg = 231
bg = 141

[git]
line = 1
order = 2
icon = ""
fg = 234

[context]
line = 1
order = 3
icon = ""
fg = 231
bg = 111
gauge = true
track = 60
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[cost]
line = 1
order = 4
icon = ""
fg = 234
bg = 179
format = "{cost:.4} · {duration}"
