# rust-my-claude — onedark theme
# One Dark (Atom-style): blue/green/red/purple on a dark charcoal base.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"
default_fg          = 231
default_bg          = 236
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 235
bg    = 75

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 176

[git]
line  = 1
order = 2
icon  = ""
fg    = 235
# bg is dynamic: clean=114, staged=35, dirty/untracked=168

[repo]
line  = 1
order = 3
icon  = ""
fg    = 250
bg    = 59

[vim]
line  = 1
order = 4
icon  = ""
fg    = 231
bg    = 24

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 235
bg    = 168

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 75
track  = 24
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 235
bg     = 180
format = "{cost:.4} · {duration}"
