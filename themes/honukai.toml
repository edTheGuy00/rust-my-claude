# rust-my-claude — honukai theme
# Plain/transparent style: cool blues and greens on dark terminal bg.
# Inspired by honukai.omp.json: bright blue user/path, green host, yellow git.

[style]
separator  = "plain"
default_fg = 252

[directory]
line  = 1
order = 0
icon  = ""
fg    = 32

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 64

[git]
line  = 1
order = 2
icon  = ""
fg    = 142

[repo]
line  = 1
order = 3
icon  = ""
fg    = 252

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 25
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 166
format = "{cost:.4} · {duration}"
