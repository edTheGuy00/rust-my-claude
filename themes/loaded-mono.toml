# rust-my-claude — loaded-mono theme
# Loaded one-line (pl): model · git · context · 5h · 7d · cost.

[style]
separator = "powerline"
default_fg = 252
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 252
bg = 240

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
gauge = true
fg = 252
bg = 245
track = 236
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limit_5h]
line = 1
order = 3
gauge = true
fg = 252
bg = 242
track = 236

[limit_7d]
line = 1
order = 4
gauge = true
fg = 252
bg = 238
track = 232

[cost]
line = 1
order = 5
icon = ""
fg = 252
bg = 240
format = "{cost:.2f}"
