# rust-my-claude — Rosé Pine theme
# Muted rose/gold/pine/foam palette; rounded caps, powerline dividers.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"   # powerline | rounded | plain
default_fg          = 231
default_bg          = 233
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 235
bg    = 181

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 235
bg    = 180

[git]
line  = 1
order = 2
icon  = ""
fg    = 231
# bg is dynamic: clean=24 (pine), staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 60

[vim]
line  = 1
order = 4
icon  = ""
fg    = 231
bg    = 24

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 235
bg    = 152

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 140
track  = 54
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 235
bg     = 180
format = "{cost:.4} · {duration}"
