# rust-my-claude — spaced-nightowl theme
# Spaced pills (style: slant): model · context · 5h · 7d, one line.

[style]
separator = "diamond"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 111

[context]
line = 1
order = 1
icon = ""
gauge = true
fg = 231
bg = 37
track = 24
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line = 1
order = 2
gauge = true
fg = 231
bg = 149
track = 143
