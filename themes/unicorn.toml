# rust-my-claude — unicorn theme
# Dark teal + electric blue + lime powerline prompt with a unicorn flair (hot-pink accent).

[style]
separator           = "powerline"
default_fg          = 231
default_bg          = 17
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 32

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 103

[git]
line  = 1
order = 2
icon  = ""
fg    = 17
bg    = 191

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 17

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 17
bg     = 191
track  = 32
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 231
bg     = 103
format = "{cost:.4} · {duration}"
