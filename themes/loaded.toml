# rust-my-claude — loaded theme
# Loaded one-line (bubble): model · git · context · 5h · 7d · cost.

[style]
separator = "diamond"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 24

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
gauge = true
fg = 231
bg = 99
track = 54
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limit_5h]
line = 1
order = 3
gauge = true
fg = 231
bg = 168
track = 162

[limit_7d]
line = 1
order = 4
gauge = true
fg = 231
bg = 33
