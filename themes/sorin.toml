# rust-my-claude — sorin theme
# Plain/transparent style with blue path, yellow git, red/yellow/green arrow prompt.
# Palette: Solarized-adjacent — blue #0973C0, yellow #C1C106, red #CB4B16, white #FFFFFF.

[style]
separator           = "plain"
default_fg          = 231

[directory]
line  = 1
order = 0
icon  = ""
fg    = 25

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231

[git]
line  = 1
order = 2
icon  = ""
fg    = 142

[repo]
line  = 1
order = 3
icon  = ""
fg    = 241

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 25
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 166
format = "{cost:.4} · {duration}"
