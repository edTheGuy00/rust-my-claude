# rust-my-claude — blueish (one-line, minimal)
# Auto-generated single-line variant of the 'blueish' theme.

[style]
separator = "powerline"
default_fg = 231
default_bg = 60
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 60

[cost]
line = 1
order = 1
icon = ""
fg = 231
bg = 60
format = "{cost:.4} · {duration}"
