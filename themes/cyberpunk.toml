# rust-my-claude — cyberpunk theme
# Neon magenta + cyan on black: maximum contrast, powerline separators.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "powerline"
default_fg          = 231
default_bg          = 16
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 16
bg    = 201

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 16
bg    = 51

[git]
line  = 1
order = 2
icon  = ""
fg    = 16
# bg is dynamic: clean=47, staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 198

[vim]
line  = 1
order = 4
icon  = ""
fg    = 16
bg    = 93

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 16
bg    = 45

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 201
track  = 53
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 16
bg     = 226
format = "{cost:.4} · {duration}"
