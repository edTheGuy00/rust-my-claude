# rust-my-claude — solarized-light theme
# Solarized Light: light parchment background, dark readable text, rounded caps.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"   # powerline | rounded | plain
default_fg          = 23
default_bg          = 230
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 32

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 23
bg    = 37

[git]
line  = 1
order = 2
icon  = ""
fg    = 23
# bg is dynamic: clean=71, staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 23
bg    = 109

[vim]
line  = 1
order = 4
icon  = ""
fg    = 23
bg    = 230

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 23
bg    = 173

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 32
track  = 67
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 23
bg     = 215
format = "{cost:.4} · {duration}"
