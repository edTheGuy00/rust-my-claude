# rust-my-claude — catppuccin theme
# Catppuccin Mocha: soft pastel mauve/pink/teal/green on a deep base.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"   # powerline | rounded | plain
default_fg          = 231
default_bg          = 235
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 235
bg    = 183

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 235
bg    = 218

[git]
line  = 1
order = 2
icon  = ""
fg    = 235
# bg is dynamic: clean=151 (green), staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 103

[vim]
line  = 1
order = 4
icon  = ""
fg    = 235
bg    = 111

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 235
bg    = 219

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 235
bg     = 183
track  = 97
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 235
bg     = 216
format = "{cost:.4} · {duration}"
