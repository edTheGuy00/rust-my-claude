# rust-my-claude — spaced-cool theme
# Four floating pills (model · context · 5h · 7d) in a cool teal/blue palette.

[style]
separator           = "diamond"
default_fg          = 231
default_bg          = 236
gauge_red_shift     = true
gauge_red_threshold = 60
cap_left            = ""
cap_right           = ""

[model]
line  = 1
order = 0
icon  = "✳"
fg    = 231
bg    = 24

[context]
line   = 1
order  = 1
icon   = ""
gauge  = true
fg     = 231
bg     = 31
track  = 23
format = "{pct:.0}%"

[limits]
line  = 1
order = 2
gauge = true
fg    = 231
bg    = 30
track = 23
