# rust-my-claude — chips theme
# Diamond style: floating rounded chips on a uniform dark background, each with
# its own coloured label/icon (the oh-my-posh "chips" look).

[style]
separator           = "diamond"
default_fg          = 252
default_bg          = 236
gauge_red_shift     = true
gauge_red_threshold = 60
cap_left            = ""
cap_right           = ""

[directory]
line  = 1
order = 0
icon  = ""
fg    = 208
bg    = 236

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 75
bg    = 236

[git]
line  = 1
order = 2
icon  = ""
fg    = 114
bg    = 236

[repo]
line  = 1
order = 3
icon  = ""
fg    = 245
bg    = 236

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 252
bg     = 73
track  = 236
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 215
bg     = 236
format = "{cost:.4} · {duration}"
