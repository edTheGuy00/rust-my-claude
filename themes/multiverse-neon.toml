# rust-my-claude — multiverse-neon theme
# Dark indigo bubbles with neon green + electric cyan accents; rounded diamond caps.

[style]
separator           = "diamond"
default_fg          = 231
default_bg          = 23
gauge_red_shift     = true
gauge_red_threshold = 60
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 77
bg    = 23

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 80
bg    = 23

[git]
line  = 1
order = 2
icon  = ""
fg    = 80
bg    = 23

[repo]
line  = 1
order = 3
icon  = ""
fg    = 209
bg    = 23

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 84
bg     = 23
track  = 17
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 209
bg     = 23
format = "{cost:.4} · {duration}"
