# rust-my-claude — slant theme
# Connected powerline chain using an angled/slanted divider. Cool palette.

[style]
separator           = "powerline"
default_fg          = 231
default_bg          = 24
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""

[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 23

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 30

[git]
line  = 1
order = 2
icon  = ""
fg    = 235

[repo]
line  = 1
order = 3
icon  = ""
fg    = 250
bg    = 24

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 31
track  = 23
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 231
bg     = 60
format = "{cost:.4} · {duration}"
