# rust-my-claude — smoothie theme
# Plain/transparent with bright neon palette: lime green, hot pink, sky blue, teal.
# Inspired by smoothie.omp.json: vivid neon accents, angle-bracket decorators.

[style]
separator  = "plain"
default_fg = 254

[directory]
line  = 1
order = 0
icon  = ""
fg    = 218

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 155

[git]
line  = 1
order = 2
icon  = ""
fg    = 75

[repo]
line  = 1
order = 3
icon  = ""
fg    = 254

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 79
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 99
format = "{cost:.4} · {duration}"
