# rust-my-claude — spaced-atomic theme
# Spaced pills (style: pl): model · context · 5h · 7d, one line.

[style]
separator = "powerline"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 31

[context]
line = 1
order = 1
icon = ""
gauge = true
fg = 231
bg = 37
track = 23
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line = 1
order = 2
gauge = true
fg = 231
bg = 209
track = 203
