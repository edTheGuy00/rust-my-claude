# rust-my-claude — spaced-material theme
# Spaced pills (style: round): model · context · 5h · 7d, one line.

[style]
separator = "rounded"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 73

[context]
line = 1
order = 1
icon = ""
gauge = true
fg = 231
bg = 73
track = 24
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line = 1
order = 2
gauge = true
fg = 231
bg = 176
track = 170
