# rust-my-claude — aliens theme
# One Dark palette: blue session, purple path, mint git; rounded-left diamond caps
# with powerline-style flow between segments.

[style]
separator           = "powerline"
default_fg          = 231
default_bg          = 235
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1 ─────────────────────────────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 75

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 134

[git]
line  = 1
order = 2
icon  = ""
fg    = 17
bg    = 121

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 235

# ── LINE 2 ─────────────────────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 75
track  = 17
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 231
bg     = 204
format = "{cost:.4} · {duration}"
