# rust-my-claude — powerline theme
# Reproduces the original look: rounded caps, powerline dividers,
# gauge red-shift on at 60%, all original components.

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"   # powerline | rounded | plain
default_fg          = 231
default_bg          = 238
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 235
bg    = 208

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 24

[git]
line  = 1
order = 2
icon  = ""
fg    = 235
# bg is dynamic: clean=71, staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 250
bg    = 238

[vim]
line  = 1
order = 4
icon  = ""
fg    = 231
bg    = 30

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 235
bg    = 168

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 99
track  = 54
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 231
bg     = 94
format = "{cost:.4} · {duration}"
