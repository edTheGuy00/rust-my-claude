# rust-my-claude — minimal (one-line, compact)
# Auto-generated single-line variant of the 'minimal' theme.

[style]
separator = "plain"
default_fg = 250
default_bg = 16
gauge_red_shift = true
gauge_red_threshold = 80

[directory]
line = 1
order = 0
icon = ""
fg = 250

[model]
line = 1
order = 1
icon = ""
fg = 51

[git]
line = 1
order = 2
icon = ""
fg = 250

[context]
line = 1
order = 3
icon = ""
fg = 250
gauge = true
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[cost]
line = 1
order = 4
icon = ""
fg = 240
format = "${cost:.2}"
