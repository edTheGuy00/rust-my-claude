# rust-my-claude — catppuccin-latte theme
# Light theme: Catppuccin Latte palette. Plain style with colourful fg on a
# bright base. Blue path, pink git, lavender model — all on the latte cream
# background. Dark text ensures readability on the light surface.

[style]
separator           = "plain"
default_fg          = 59
default_bg          = 231

[directory]
line  = 1
order = 0
icon  = ""
fg    = 27

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 99

[git]
line  = 1
order = 2
icon  = ""
fg    = 176

[repo]
line  = 1
order = 3
icon  = ""
fg    = 60

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 38
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 70
format = "{cost:.4} · {duration}"
