# rust-my-claude — powerlevel10k-rainbow theme
# Box-drawing corners with reverse-powerline dividers; GNOME Tango palette:
# grey/white caps, cobalt blue directory, green git, gold execution time.

[style]
separator           = "powerline"
default_fg          = 16
default_bg          = 188
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: location & identity ─────────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 61

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 64

[git]
line  = 1
order = 2
icon  = ""
fg    = 16
# bg dynamic: clean=64, staged/dirty=136, ahead/behind=81

[repo]
line  = 1
order = 3
icon  = ""
fg    = 16
bg    = 188

# ── LINE 2: budgets & cost ───────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 61
track  = 18
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 16
bg     = 136
format = "{cost:.4} · {duration}"
