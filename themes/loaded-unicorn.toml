# rust-my-claude — loaded-unicorn theme
# Loaded one-line (slant): model · git · context · 5h · 7d · cost.

[style]
separator = "diamond"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 30

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
gauge = true
fg = 231
bg = 37
track = 23
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limit_5h]
line = 1
order = 3
gauge = true
fg = 231
bg = 198
track = 192

[limit_7d]
line = 1
order = 4
gauge = true
fg = 231
bg = 38
track = 32

[cost]
line = 1
order = 5
icon = ""
fg = 231
bg = 226
format = "{cost:.2f}"
