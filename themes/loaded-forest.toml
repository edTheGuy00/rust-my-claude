# rust-my-claude — loaded-forest theme
# Loaded one-line (plslant): model · git · context · 5h · 7d · cost.

[style]
separator = "powerline"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 28

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
gauge = true
fg = 231
bg = 29
track = 22
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limit_5h]
line = 1
order = 3
gauge = true
fg = 231
bg = 100
track = 94

[limit_7d]
line = 1
order = 4
gauge = true
fg = 231
bg = 24
track = 18

[cost]
line = 1
order = 5
icon = ""
fg = 231
bg = 130
format = "{cost:.2f}"
