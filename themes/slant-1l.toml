order = 0
icon = ""
fg = 231
bg = 23

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
fg = 231
bg = 31
gauge = true
track = 23
format = "{pct:.0}%"

[limits]
