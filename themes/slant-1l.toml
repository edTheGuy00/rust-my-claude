# rust-my-claude — slant (one-line, compact)
# Auto-generated single-line variant of the 'slant' theme.

[style]
separator = "powerline"
default_fg = 231
default_bg = 24
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""

[directory]
