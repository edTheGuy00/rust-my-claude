# rust-my-claude — spaced-monokai theme
# Spaced pills (style: plflame): model · context · 5h · 7d, one line.

[style]
separator = "powerline"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 81

[context]
line = 1
order = 1
icon = ""
gauge = true
fg = 231
bg = 81
track = 24
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line = 1
order = 2
gauge = true
fg = 231
bg = 197
track = 191
