# rust-my-claude — spaced-cobalt theme
# Spaced pills (style: bubble): model · context · 5h · 7d, one line.

[style]
separator = "diamond"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 76

[context]
line = 1
order = 1
icon = ""
gauge = true
fg = 231
bg = 26
track = 237
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line = 1
order = 2
gauge = true
fg = 231
bg = 220
track = 214
