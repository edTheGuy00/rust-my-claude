# rust-my-claude — blueish theme
# Powerline style with teal/slate-grey backgrounds, bright cyan accents,
# and a steel-blue git panel — a cool monochromatic blue palette throughout.

[style]
separator           = "powerline"
default_fg          = 231
default_bg          = 60
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 23
bg    = 38

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 60

[git]
line  = 1
order = 2
icon  = ""
fg    = 23
bg    = 152

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 60

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 23
bg     = 44
track  = 60
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 231
bg     = 60
format = "{cost:.4} · {duration}"
