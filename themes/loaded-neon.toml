# rust-my-claude — loaded-neon theme
# Loaded one-line (plflame): model · git · context · 5h · 7d · cost.

[style]
separator = "powerline"
default_fg = 16
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 16
bg = 201

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
gauge = true
fg = 16
bg = 51
track = 53
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limit_5h]
line = 1
order = 3
gauge = true
fg = 16
bg = 226
track = 220

[limit_7d]
line = 1
order = 4
gauge = true
fg = 16
bg = 51
track = 45

[cost]
line = 1
order = 5
icon = ""
fg = 16
bg = 46
format = "{cost:.2f}"
