# rust-my-claude — material theme
# Plain/transparent style with vivid atom-one-dark accent colours:
# cyan path, red/blue git, green accent — no backgrounds, minimal clutter.

[style]
separator           = "plain"
default_fg          = 231
gauge_red_shift     = true
gauge_red_threshold = 70

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 73

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 176

[git]
line  = 1
order = 2
icon  = ""
fg    = 167

[repo]
line  = 1
order = 3
icon  = ""
fg    = 74

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 84
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[cost]
line   = 2
order  = 1
icon   = ""
fg     = 84
format = "{cost:.4} · {duration}"
