# rust-my-claude — velvet theme
# Deep purple-to-midnight gradient (bg darkens from #69307A to #0E050F) with
# soft lavender (#EFDCF9) text; powerline flame divider () throughout.

[style]
separator           = "powerline"
default_fg          = 225
default_bg          = 53
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

[directory]
line  = 1
order = 0
icon  = ""
fg    = 225
bg    = 17

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 191
bg    = 53

[git]
line  = 1
order = 2
icon  = ""
fg    = 225
bg    = 60

[repo]
line  = 1
order = 3
icon  = ""
fg    = 225
bg    = 53

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 225
bg     = 53
track  = 17
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 191
bg     = 60
format = "{cost:.4} · {duration}"
