# rust-my-claude — tonybaloney theme
# Dark navy (#18354c) + amber (#ffc107) powerline style with trailing arrow dividers.
# Inspired by tonybaloney.omp.json: navy/dark-teal bg, golden-amber fg.

[style]
separator           = "diamond"
default_fg          = 214
default_bg          = 23
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

[directory]
line  = 1
order = 0
icon  = ""
fg    = 23
bg    = 214

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 214
bg    = 23

[git]
line  = 1
order = 2
icon  = ""
fg    = 23

[repo]
line  = 1
order = 3
icon  = ""
fg    = 214
bg    = 23

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 23
bg     = 214
track  = 136
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 214
bg     = 23
format = "{cost:.4} · {duration}"
