# rust-my-claude — thecyberden theme
# Powerline with teal + electric blue + gold segments; cyber terminal aesthetic.

[style]
separator           = "powerline"
default_fg          = 231
default_bg          = 30
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 33

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 16
bg    = 142

[git]
line  = 1
order = 2
icon  = ""
fg    = 231
bg    = 30

[repo]
line  = 1
order = 3
icon  = ""
fg    = 231
bg    = 33

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 33
track  = 17
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 16
bg     = 142
format = "{cost:.4} · {duration}"
