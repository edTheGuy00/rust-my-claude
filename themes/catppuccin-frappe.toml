# rust-my-claude — catppuccin-frappe theme
# Medium-dark theme: Catppuccin Frappe palette. Powerline style on a grey-
# indigo base, with soft blue directory, mauve model, pink git — mid-contrast
# pastels that sit between Macchiato and Latte in darkness.

[style]
separator           = "powerline"
default_fg          = 189
default_bg          = 237
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

[directory]
line  = 1
order = 0
icon  = ""
fg    = 237
bg    = 111

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 237
bg    = 182

[git]
line  = 1
order = 2
icon  = ""
fg    = 237

[repo]
line  = 1
order = 3
icon  = ""
fg    = 146
bg    = 59

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 237
bg     = 147
track  = 59
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 237
bg     = 218
format = "{cost:.4} · {duration}"
