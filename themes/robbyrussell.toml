# rust-my-claude — robbyrussell theme
# Plain/transparent style: green arrow, teal path, rosy-red git — the iconic
# oh-my-zsh default palette rendered without backgrounds or separators.

[style]
separator           = "plain"
default_fg          = 252

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 73

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 114

[git]
line  = 1
order = 2
icon  = ""
fg    = 167

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 221
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[cost]
line   = 2
order  = 1
icon   = ""
fg     = 114
format = "{cost:.4} · {duration}"
