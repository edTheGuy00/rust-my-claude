# rust-my-claude — paradox theme
# Powerline style with pastel palette: warm yellow, sky blue, mint green,
# violet, and salmon on near-black text. Classic powerline arrows.

[style]
separator           = "powerline"
default_fg          = 235
default_bg          = 236
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 235
bg    = 117

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 235
bg    = 223

[git]
line  = 1
order = 2
icon  = ""
fg    = 235
bg    = 121

[repo]
line  = 1
order = 3
icon  = ""
fg    = 235
bg    = 99

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 235
bg     = 210
track  = 167
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 235
bg     = 223
format = "{cost:.4} · {duration}"
