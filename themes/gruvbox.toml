# rust-my-claude — gruvbox theme
# Warm retro orange/yellow/aqua on dark brown (Gruvbox dark palette).

# ── Global look ────────────────────────────────────────────────
[style]
separator           = "rounded"   # powerline | rounded | plain
default_fg          = 223
default_bg          = 235
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: where am I, who am I ───────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 235
bg    = 208

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 235
bg    = 214

[git]
line  = 1
order = 2
icon  = ""
fg    = 235
# bg is dynamic: clean=71, staged=35, dirty/untracked=178

[repo]
line  = 1
order = 3
icon  = ""
fg    = 235
bg    = 245

[vim]
line  = 1
order = 4
icon  = ""
fg    = 235
bg    = 130

[thinking]
line  = 1
order = 5
icon  = ""
fg    = 235
bg    = 166

# ── LINE 2: budgets & cost ─────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 235
bg     = 108
track  = 65
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 235
bg     = 166
format = "{cost:.4} · {duration}"
