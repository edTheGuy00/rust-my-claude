# rust-my-claude — jandedobbeleer theme
# Mixed diamond + powerline: round bubble caps (E0B6/E0B4), standard powerline
# dividers (E0B0). Vivid palette: purple session, hot-pink path, yellow git.

[style]
separator           = "diamond"
default_fg          = 231
default_bg          = 238
gauge_red_shift     = true
gauge_red_threshold = 60
powerline_divider   = ""
cap_left            = ""
cap_right           = ""

# ── LINE 1: location & identity ─────────────────────────────────
[directory]
line  = 1
order = 0
icon  = ""
fg    = 231
bg    = 204

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 231
bg    = 141

[git]
line  = 1
order = 2
icon  = ""
fg    = 23
# bg dynamic: clean=221, staged/dirty=208, ahead/behind=135

[repo]
line  = 1
order = 3
icon  = ""
fg    = 250
bg    = 238

# ── LINE 2: budgets & cost ───────────────────────────────────────
[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 231
bg     = 141
track  = 54
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 23
bg     = 221
format = "{cost:.4} · {duration}"
