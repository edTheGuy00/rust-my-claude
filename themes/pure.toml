# rust-my-claude — pure theme
# Plain/transparent style inspired by pure prompt; Nord palette.
# Rose username, steel-blue path, grey git, mauve prompt glyph.

[style]
separator           = "plain"
default_fg          = 252

[directory]
line  = 1
order = 0
icon  = ""
fg    = 109

[model]
line  = 1
order = 1
icon  = "✳"
fg    = 139

[git]
line  = 1
order = 2
icon  = ""
fg    = 241

[context]
line   = 2
order  = 0
icon   = ""
gauge  = true
fg     = 110
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line  = 2
order = 1
gauge = true

[cost]
line   = 2
order  = 2
icon   = ""
fg     = 144
format = "{cost:.4} · {duration}"
