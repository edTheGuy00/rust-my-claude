# rust-my-claude — spaced-solarized theme
# Spaced pills (style: plain): model · context · 5h · 7d, one line.

[style]
separator = "plain"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60

[model]
line = 1
order = 0
icon = "✳"
fg = 32

[context]
line = 1
order = 1
icon = ""
gauge = true
fg = 32
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limits]
line = 1
order = 2
gauge = true
fg = 136
