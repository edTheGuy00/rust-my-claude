# rust-my-claude — loaded-ember theme
# Loaded one-line (round): model · git · context · 5h · 7d · cost.

[style]
separator = "rounded"
default_fg = 231
default_bg = 236
gauge_red_shift = true
gauge_red_threshold = 60
powerline_divider = ""
cap_left = ""
cap_right = ""

[model]
line = 1
order = 0
icon = "✳"
fg = 231
bg = 88

[git]
line = 1
order = 1
icon = ""
fg = 235

[context]
line = 1
order = 2
icon = ""
gauge = true
fg = 231
bg = 166
track = 52
format = "{pct:.0}% · {in_tok}k/{ctx_size}k"

[limit_5h]
line = 1
order = 3
gauge = true
fg = 231
bg = 124
track = 118

[limit_7d]
line = 1
order = 4
gauge = true
fg = 231
bg = 130
track = 124

[cost]
line = 1
order = 5
icon = ""
fg = 231
bg = 94
format = "{cost:.2f}"
