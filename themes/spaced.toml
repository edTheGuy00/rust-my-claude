# rust-my-claude — spaced theme
# Four floating pills on one line: model · context · 5h · 7d (diamond/bubble
# style). 5h and 7d keep their distinct magenta/blue accent.

[style]
separator           = "diamond"
default_fg          = 231
default_bg          = 236
gauge_red_shift     = true
gauge_red_threshold = 60
cap_left            = ""
cap_right           = ""

[model]
line  = 1
order = 0
icon  = "✳"
fg    = 231
bg    = 24

[context]
line   = 1
order  = 1
icon   = ""
gauge  = true
fg     = 231
bg     = 99
track  = 54
format = "{pct:.0}%"

[limits]
line  = 1
order = 2
gauge = true
